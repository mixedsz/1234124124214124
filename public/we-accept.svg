<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 326 44" fill="none">
  <!-- Visa -->
  <rect x="0" y="2" width="50" height="32" rx="5" fill="#1434CB"/>
  <text x="7" y="23" font-family="Arial,Helvetica,sans-serif" font-size="13" font-weight="900" fill="white" letter-spacing="0.5">VISA</text>

  <!-- Mastercard -->
  <rect x="58" y="2" width="50" height="32" rx="5" fill="#1A1F36"/>
  <circle cx="77" cy="18" r="10" fill="#EB001B"/>
  <circle cx="91" cy="18" r="10" fill="#F79E1B"/>
  <path d="M84 10.6a10 10 0 0 1 0 14.8A10 10 0 0 1 84 10.6z" fill="#FF5F00"/>

  <!-- Amex -->
  <rect x="116" y="2" width="50" height="32" rx="5" fill="#2E77BC"/>
  <text x="118" y="15" font-family="Arial,Helvetica,sans-serif" font-size="7.5" font-weight="700" fill="white">AMERICAN</text>
  <text x="118" y="25" font-family="Arial,Helvetica,sans-serif" font-size="7.5" font-weight="700" fill="white">EXPRESS</text>

  <!-- PayPal -->
  <rect x="174" y="2" width="50" height="32" rx="5" fill="#F5F7FA"/>
  <text x="180" y="21" font-family="Arial,Helvetica,sans-serif" font-size="11" font-weight="900" fill="#003087">Pay</text>
  <text x="203" y="21" font-family="Arial,Helvetica,sans-serif" font-size="11" font-weight="900" fill="#009CDE">Pal</text>

  <!-- Apple Pay -->
  <rect x="232" y="2" width="50" height="32" rx="5" fill="#000000"/>
  <text x="244" y="15" font-family="-apple-system,BlinkMacSystemFont,Arial,sans-serif" font-size="7" font-weight="600" fill="white">Apple</text>
  <text x="245" y="26" font-family="-apple-system,BlinkMacSystemFont,Arial,sans-serif" font-size="7" font-weight="600" fill="white">Pay</text>

  <!-- Google Pay -->
  <rect x="290" y="2" width="50" height="32" rx="5" fill="#F5F7FA"/>
  <text x="292" y="15" font-family="Arial,Helvetica,sans-serif" font-size="7" font-weight="700" fill="#3C4043">Google</text>
  <text x="298" y="26" font-family="Arial,Helvetica,sans-serif" font-size="7" font-weight="700" fill="#3C4043">Pay</text>
</svg>
