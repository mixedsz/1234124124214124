{% extends 'layout.html' %}

{% block title %}{{ page.title }} - {{ store.name }}{% endblock %}

{% block content %}
<section class="page-header">
    <div class="container">
        <h1 class="page-title">{{ page.title }}</h1>
    </div>
</section>

<section class="section">
    <div class="container">
        <div class="cms-content">
            {{ page.content | raw }}
        </div>
    </div>
</section>
{% endblock %}
